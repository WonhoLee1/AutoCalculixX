<H4><A NAME="SECTION000724630000000000000">
Mass matrix in (local) main axis coordinate frame</A>
</H4> 
<BR>
<P>
Consequently, the mass matrix becomes in the principal axis coordinates
<P></P>
<DIV ALIGN="CENTER" CLASS="mathdisplay"><!-- MATH
 \begin{equation}
\boldsymbol{M}
        = \left[
           \begin{array}{cc}
             \boldsymbol{M}_D & \boldsymbol{M}_{ND} \\
             \boldsymbol{M}^T_{ND} & \boldsymbol{M}_D
           \end{array}
    \right]
\end{equation}
 -->
<TABLE CLASS="equation" CELLPADDING="0" WIDTH="100%" ALIGN="CENTER">
<TR VALIGN="MIDDLE">
<TD NOWRAP ALIGN="CENTER"><SPAN CLASS="MATH"><IMG
 WIDTH="179" HEIGHT="56" ALIGN="MIDDLE" BORDER="0"
 SRC="img405.png"
 ALT="$\displaystyle \boldsymbol{M} = \left[ \begin{array}{cc} \boldsymbol{M}_D &amp; \boldsymbol{M}_{ND} \\ \boldsymbol{M}^T_{ND} &amp; \boldsymbol{M}_D \end{array} \right]$"></SPAN></TD>
<TD NOWRAP CLASS="eqno" WIDTH="10" ALIGN="RIGHT">
(<SPAN CLASS="arabic">37</SPAN>)</TD></TR>
</TABLE></DIV>
<BR CLEAR="ALL"><P></P>
with
<P></P>
<DIV ALIGN="CENTER" CLASS="mathdisplay"><!-- MATH
 \begin{equation}
\boldsymbol{M}_D =
    \frac{1}{3}(X_2 - X_1)
    \left[
        \begin{array}{cccccc}
            \rho A & 0 & 0 & 0 & 0 & 0 \\
            0 & \rho A & 0 & 0 & 0 & 0  \\
            0 & 0 & \rho A & 0 & 0 & 0 \\
            0 & 0 & 0 & \rho I_p & 0 & 0 \\
            0 & 0 & 0 & 0 & \rho I_{22} & 0  \\
            0 & 0 & 0 & 0 & 0 & \rho I_{33}
        \end{array}
    \right]
\end{equation}
 -->
<TABLE CLASS="equation" CELLPADDING="0" WIDTH="100%" ALIGN="CENTER">
<TR VALIGN="MIDDLE">
<TD NOWRAP ALIGN="CENTER"><SPAN CLASS="MATH"><IMG

 ALT="$\displaystyle \boldsymbol{M}_D = \frac{1}{3}(X_2 - X_1) \left[ \begin{array}{cc...
... 0 &amp; 0 &amp; \rho I_{22} &amp; 0 \\ 0 &amp; 0 &amp; 0 &amp; 0 &amp; 0 &amp; \rho I_{33} \end{array} \right]$"></SPAN></TD>
<TD NOWRAP CLASS="eqno" WIDTH="10" ALIGN="RIGHT">
(<SPAN CLASS="arabic">38</SPAN>)</TD></TR>
</TABLE></DIV>
<BR CLEAR="ALL"><P></P>
and
<P></P>
<DIV ALIGN="CENTER" CLASS="mathdisplay"><!-- MATH
 \begin{equation}

            0 & \rho A & 0 & 0 & 0 &0  \\
            0 & 0 & \rho A & 0 & 0 & 0 \\
            0 & 0 & 0 & \rho I_p & 0 & 0 \\
            0 & 0 & 0 & 0 & \rho I_{22} & 0  \\
            0 & 0 & 0 & 0 & 0 & \rho I_{33}
        \end{array}
    \right]
\end{equation}
